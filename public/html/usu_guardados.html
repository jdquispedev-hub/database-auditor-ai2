<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DataScript AI - Documentos guardados</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Outfit', sans-serif; background: #0a0e1a; color: #eef2ff; height: 100vh; overflow: hidden; }
        .dashboard-wrapper { display: flex; height: 100vh; }
        .sidebar {
            width: 260px;
            background: #111827;
            border-right: 1px solid #2d3a5e;
            display: flex;
            flex-direction: column;
        }
        .logo-sidebar {
            font-size: 1.4rem;
            font-weight: bold;
            padding: 24px;
            text-align: center;
            background: linear-gradient(135deg, #a78bfa, #5e6ad2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border-bottom: 1px solid #2d3a5e;
        }
        .menu-item {
            padding: 12px 24px;
            margin: 4px 12px;
            border-radius: 12px;
            transition: 0.2s;
            color: #cbd5e1;
            text-decoration: none;
            display: block;
        }
        .menu-item:hover { background: #1e293b; color: white; }
        .menu-item.active { background: #5e6ad2; color: white; }
        .logout { margin-top: auto; margin-bottom: 24px; color: #f87171; cursor: pointer; }
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #2d3a5e; text-align: center; font-size: 0.75rem; color: #6b7280; }
        .doc-table { width:100%; background:rgba(17,24,39,0.6); border-radius:20px; border-collapse:collapse; margin-top:20px; }
        .doc-table th, .doc-table td { padding:12px 16px; text-align:left; border-bottom:1px solid #2d3a5e; }
        .doc-table th { background:#1e293b; }
        .action-buttons button { background:none; border:none; color:#a78bfa; cursor:pointer; margin-right:12px; }
        .loading { text-align:center; padding:2rem; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:#111827; border-radius:28px; max-width:800px; width:90%; max-height:80%; overflow-y:auto; padding:24px; border:1px solid #5e6ad2; position:relative; }
        .close-modal { position:absolute; top:16px; right:24px; font-size:28px; cursor:pointer; }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="logo-sidebar">DataScript AI</div>
        <a href="usu_panel.html" class="menu-item">Dashboard</a>
        <a href="usu_generar.html" class="menu-item">Generar documento</a>
        <a href="usu_guardados.html" class="menu-item active">Documentos guardados</a>
        <div class="menu-item logout" id="logoutBtn">Cerrar Sesion</div>
    </aside>
    <main class="content">
        <div id="dynamicView"></div>
        <footer class="footer"><center>Tiempo de actividad: Año 2026</center></footer>
    </main>
</div>
<div id="docModal" class="modal" style="display:none;"><div class="modal-content"><span class="close-modal">&times;</span><div id="modalBody"></div></div></div>

<script>
    if (!sessionStorage.getItem('ds_logged')) window.location.href = '../index.html';

    const SUPABASE_URL = 'https://anzravhguhsdfnjfsjcm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_sIB2jrePXiRBfBidFDFRjA_JeYe5cfP';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const userId = sessionStorage.getItem('ds_user');

    async function cargarDocumentos() {
        const { data } = await supabase.from('documentos').select('*').eq('usuario_id', userId).order('created_at', {ascending:false});
        return data || [];
    }
    async function cargarPapelera() {
        const { data } = await supabase.from('papelera').select('*').eq('usuario_id', userId);
        return data || [];
    }
    async function moverAPapelera(id, nombre, acceso, contenido) {
        await supabase.from('papelera').insert([{ usuario_id: userId, nombre, acceso, fecha_eliminacion: new Date(), contenido }]);
        await supabase.from('documentos').delete().eq('id', id);
    }
    async function restaurarDocumento(papId, nombre, acceso, contenido) {
        await supabase.from('documentos').insert([{ usuario_id: userId, nombre, acceso, fecha_mod: new Date(), contenido }]);
        await supabase.from('papelera').delete().eq('id', papId);
    }
    async function eliminarPermanente(papId) {
        await supabase.from('papelera').delete().eq('id', papId);
    }
    async function limpiarPapelera() {
        const items = await cargarPapelera();
        const ahora = new Date();
        for (const item of items) {
            const dias = (ahora - new Date(item.fecha_eliminacion)) / (1000*60*60*24);
            if (dias >= 15) await eliminarPermanente(item.id);
        }
    }

    async function render() {
        await limpiarPapelera();
        const docs = await cargarDocumentos();
        const papelera = await cargarPapelera();
        let html = `<h2>📄 Documentos activos</h2>`;
        if (docs.length === 0) html += `<div class="loading">No hay documentos guardados.</div>`;
        else {
            html += `<table class="doc-table"><thead><tr><th>Nombre</th><th>Acceso</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody>`;
            for (const doc of docs) {
                html += `<tr>
                    <td>${escapeHtml(doc.nombre)}</td>
                    <td>${doc.acceso}</td>
                    <td>${new Date(doc.fecha_mod).toLocaleDateString()}</td>
                    <td class="action-buttons">
                        <button class="view-doc" data-contenido='${JSON.stringify(doc.contenido)}'>Ver</button>
                        <button class="edit-doc" data-id="${doc.id}" data-nombre="${doc.nombre}">Editar</button>
                        <button class="delete-doc" data-id="${doc.id}" data-nombre="${doc.nombre}" data-acceso="${doc.acceso}" data-contenido='${JSON.stringify(doc.contenido)}'>Eliminar</button>
                    </td>
                </tr>`;
            }
            html += `</tbody></table>`;
        }

        html += `<h2 style="margin-top:40px;">🗑️ Papelera (eliminación automática tras 15 días)</h2>`;
        if (papelera.length === 0) html += `<div class="loading">Papelera vacía.</div>`;
        else {
            const ahora = new Date();
            html += `<table class="doc-table"><thead><tr><th>Nombre</th><th>Eliminado el</th><th>Tiempo restante</th><th>Acciones</th></tr></thead><tbody>`;
            for (const item of papelera) {
                const dias = Math.floor((ahora - new Date(item.fecha_eliminacion)) / (1000*60*60*24));
                const restante = Math.max(0, 15 - dias);
                html += `<tr>
                    <td>${escapeHtml(item.nombre)}</td>
                    <td>${new Date(item.fecha_eliminacion).toLocaleDateString()}</td>
                    <td>${restante} días</td>
                    <td class="action-buttons">
                        <button class="restore-pap" data-id="${item.id}" data-nombre="${item.nombre}" data-acceso="${item.acceso}" data-contenido='${JSON.stringify(item.contenido)}'>Restaurar</button>
                        <button class="delete-perm" data-id="${item.id}">Eliminar definitivo</button>
                    </td>
                </tr>`;
            }
            html += `</tbody></table>`;
        }
        document.getElementById('dynamicView').innerHTML = html;

        // Eventos para documentos activos
        document.querySelectorAll('.view-doc').forEach(btn => {
            btn.addEventListener('click', () => {
                const c = JSON.parse(btn.dataset.contenido);
                document.getElementById('modalBody').innerHTML = `<pre>${JSON.stringify(c, null, 2)}</pre>`;
                document.getElementById('docModal').style.display = 'flex';
            });
        });
        document.querySelectorAll('.edit-doc').forEach(btn => {
            btn.addEventListener('click', async () => {
                const nuevo = prompt('Nuevo nombre:', btn.dataset.nombre);
                if (nuevo) await supabase.from('documentos').update({ nombre: nuevo }).eq('id', btn.dataset.id);
                render();
            });
        });
        document.querySelectorAll('.delete-doc').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Mover a papelera?')) {
                    await moverAPapelera(btn.dataset.id, btn.dataset.nombre, btn.dataset.acceso, JSON.parse(btn.dataset.contenido));
                    render();
                }
            });
        });
        // Eventos papelera
        document.querySelectorAll('.restore-pap').forEach(btn => {
            btn.addEventListener('click', async () => {
                await restaurarDocumento(btn.dataset.id, btn.dataset.nombre, btn.dataset.acceso, JSON.parse(btn.dataset.contenido));
                render();
            });
        });
        document.querySelectorAll('.delete-perm').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Eliminar permanentemente?')) await eliminarPermanente(btn.dataset.id);
                render();
            });
        });
        document.querySelector('.close-modal')?.addEventListener('click', () => document.getElementById('docModal').style.display = 'none');
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        sessionStorage.clear();
        window.location.href = '../index.html';
    });

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
    render();
</script>
</body>
</html>
